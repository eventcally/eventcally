default_language_version:
  python: python3.11
repos:
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.11
  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
    - id: flake8
  - repo: local
    hooks:
      - id: import-whitelist
        name: import-whitelist
        entry: python .scripts/module_import_whitelist.py project/domain project/application
        language: python
        pass_filenames: false
      - id: import-linter
        name: import-linter
        entry: lint-imports
        language: python
        additional_dependencies:
          - import-linter==1.12.1
        pass_filenames: false